# Read the Docs build configuration.
# Mirrors the gseg-ethz/PCHandler build config, but references this project's
# `docs` extra (PCHandler names its extra `doc`). The RTD project import is
# deferred to post-public release (D-09); this config is committed now so
# hosting activates as soon as the repository goes public.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_build:
      - cp LICENSE $READTHEDOCS_OUTPUT/html/LICENSE.txt

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
