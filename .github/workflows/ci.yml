name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install lint deps
        # ruff and pyright are pinned so CI matches the pre-commit config;
        # no project install needed for either.
        run: pip install ruff==0.8.4 pyright==1.1.392

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: Install project for pyright
        # Pyright resolves third-party imports against the installed
        # environment, so it needs the framework wheel + dev tools.
        # Tool extras (iof3d, f2s3) are intentionally omitted here so
        # the lint job stays fast; per-extra typing is exercised by the
        # matching test job below.
        run: pip install -e .[dev]

      - name: pyright
        run: pyright

  test:
    name: Test (${{ matrix.job.name }})
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job:
          # Framework wheel only, no tool extras. Guarantees the bench
          # works without iof3D / pchandler / pc2img.
          - { name: core,  extra: ".[dev]"        , enabled: "true" }
          # iof3D adapter. Disabled until iof3D is published on a
          # reachable index; flip `enabled` to "true" then.
          - { name: iof3d, extra: ".[iof3d,dev]"  , enabled: "false" }
          # F2S3 adapter. Pure-Python; the binary itself is not
          # required by the parser-shape tests scaffolded here.
          - { name: f2s3,  extra: ".[f2s3,dev]"   , enabled: "true" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: matrix.job.enabled == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        if: matrix.job.enabled == 'true'
        run: pip install -e "${{ matrix.job.extra }}"

      - name: pytest
        if: matrix.job.enabled == 'true'
        run: pytest tests/${{ matrix.job.name }} -v

      - name: Disabled
        if: matrix.job.enabled != 'true'
        run: echo "Job ${{ matrix.job.name }} is disabled; flip the matrix flag to enable."

  build:
    name: Build wheel + install smoke
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm reads tags to derive the version.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: twine check
        run: twine check dist/*

      - name: Install built wheel into a fresh venv
        # Catches "wheel built but doesn't actually install" regressions:
        # missing package_data, broken metadata, etc.
        run: |
          python -m venv /tmp/smoke-env
          /tmp/smoke-env/bin/pip install --upgrade pip
          /tmp/smoke-env/bin/pip install dist/*.whl
          /tmp/smoke-env/bin/python -c "import geodispbench3d; print(geodispbench3d.__name__)"
          /tmp/smoke-env/bin/geodispbench3d --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
