name: Publish to TestPyPI

# Manual OIDC dry-run to test.pypi.org (the CICD-03 proof step exercised by
# Plan 06). workflow_dispatch only, so this path never reaches production PyPI
# and therefore needs no release-event preflight. attestations are off (PEP 740
# support on TestPyPI is inconsistent) and skip-existing tolerates re-runs.
#
# The "on" key is quoted so PyYAML does not coerce it to the boolean True
# (review MEDIUM 05-03). Every action is SHA-pinned (D-07).
"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          # setuptools_scm derives the version from tags.
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build --wheel --sdist

      - name: twine check
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 1

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist-${{ github.run_id }}
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
          skip-existing: true
