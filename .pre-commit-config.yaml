repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Replaces black + isort + flake8 + flake8-bugbear + flake8-docstrings
      # with a single tool that's 50-100x faster and reads its config from
      # pyproject.toml.
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.392
    hooks:
      - id: pyright
        # Pass the project root so pyright finds pyrightconfig.json.
        # `pass_filenames: false` matches the CI invocation (whole-project
        # check); per-file checks miss cross-file type errors.
        pass_filenames: false
